services:
  db:
    image: mysql:8.0
    container_name: wp-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-wordpress}
      MYSQL_USER: ${DB_USER:-wpuser}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:fpm-alpine
    container_name: wp-app
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${DB_USER:-wpuser}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME:-wordpress}
      WORDPRESS_TABLE_PREFIX: ${WP_TABLE_PREFIX:-wp_}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HTTP_BLOCK_EXTERNAL', true);
        define('DISALLOW_FILE_MODS', true);
        define('WP_AUTO_UPDATE_CORE', false);
        define('WP_ACCESSIBLE_HOSTS', '');
        define('DISABLE_WP_CRON', true);
    volumes:
      - wp_data:/var/www/html
      - ./wp-content:/var/www/html/wp-content
      - ./php/upload.ini:/usr/local/etc/php/conf.d/upload.ini:ro

  nginx:
    image: nginx:alpine
    container_name: wp-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - wp_data:/var/www/html:ro
      - ./wp-content:/var/www/html/wp-content:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/cache.conf:/etc/nginx/conf.d/cache.conf:ro
      - /home/archive/certs:/etc/nginx/certs:ro
    depends_on:
      - wordpress

volumes:
  db_data:
  wp_data:
