upstream php {
    server wordpress:9000;
}

server {
    listen 80;
    return 301 https://$host:8443$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    client_max_body_size 32M;

    ssl_certificate /etc/nginx/certs/self-signed.crt;
    ssl_certificate_key /etc/nginx/certs/self-signed.key;

    root /var/www/html;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow:\n";
    }

    set $skip_cache 0;
    if ($query_string) { set $skip_cache 1; }
    if ($request_method != GET) { set $skip_cache 1; }
    if ($request_uri ~* "/wp-(admin|login|cron)") { set $skip_cache 1; }

    location ~ \.php$ {
        fastcgi_pass php;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        include fastcgi_params;
        fastcgi_cache wpcache;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;
        fastcgi_cache_valid 200 60m;
        add_header X-Cache-Status $upstream_cache_status;

    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. {
        deny all;
    }
}
